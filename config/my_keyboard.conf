# my_keyboard.conf
# ZMK configuration for 42-key wireless split keyboard
# MCU: Seeed XIAO BLE (nRF52840)

# ── Bluetooth ──────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE=y

# Allow up to 5 paired hosts
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Split keyboard ──────────────────────────────────────────────────────────
# Set to y on the LEFT half build, n on the RIGHT half build.
# GitHub Actions builds both; the workflow passes this per-target.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# ── Power management ────────────────────────────────────────────────────────
# Deep sleep after 30 minutes idle (saves battery)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ── USB (wired fallback when plugged in) ────────────────────────────────────
CONFIG_ZMK_USB=y

# ── Logging (disable for production, enable for debug) ───────────────────────
# CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_LOG_LEVEL_WRN=y

# ── XIAO BLE specific ───────────────────────────────────────────────────────
# Battery level reporting via ADC
CONFIG_ZMK_BATTERY_REPORTING=y
